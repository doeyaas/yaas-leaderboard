name: Instagram Scraper

on:
  schedule:
    # Start 2 hours before target display times (IST = UTC+5:30)
    # Target: 12:00 PM IST → start 10:00 AM IST = 04:30 UTC — first run (limit 30)
    - cron: '30 4 * * *'
    # Target: 3:00 PM IST → start 1:00 PM IST = 07:30 UTC — repeat (limit 15)
    - cron: '30 7 * * *'
    # Target: 7:00 PM IST → start 5:00 PM IST = 11:30 UTC — repeat (limit 15)
    - cron: '30 11 * * *'
  workflow_dispatch:        # allow manual trigger from GitHub UI

jobs:
  scrape-first:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    if: github.event_name == 'workflow_dispatch' || github.event.schedule == '30 4 * * *'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: scraper/requirements.txt

      - name: Install dependencies
        run: pip install -r scraper/requirements.txt

      - name: Run scraper
        env:
          NEXT_PUBLIC_SUPABASE_URL:  ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          INSTAGRAM_USERNAME:        ${{ secrets.INSTAGRAM_USERNAME }}
          INSTAGRAM_SESSIONID:       ${{ secrets.INSTAGRAM_SESSIONID }}
          SCRAPE_LIMIT:              "30"
          PYTHONUNBUFFERED:          "1"
        run: python scraper/instagram_scraper.py

      - name: Recompute leaderboard
        env:
          VERCEL_URL:  ${{ secrets.VERCEL_URL }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: |
          curl -s -X POST "$VERCEL_URL/api/scrape/recompute" \
            -H "Authorization: Bearer $CRON_SECRET" \
            --fail-with-body

  scrape-repeat:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    if: github.event.schedule == '30 7 * * *' || github.event.schedule == '30 11 * * *'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: scraper/requirements.txt

      - name: Install dependencies
        run: pip install -r scraper/requirements.txt

      - name: Run scraper
        env:
          NEXT_PUBLIC_SUPABASE_URL:  ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          INSTAGRAM_USERNAME:        ${{ secrets.INSTAGRAM_USERNAME }}
          INSTAGRAM_SESSIONID:       ${{ secrets.INSTAGRAM_SESSIONID }}
          SCRAPE_LIMIT:              "15"
          PYTHONUNBUFFERED:          "1"
        run: python scraper/instagram_scraper.py

      - name: Recompute leaderboard
        env:
          VERCEL_URL:  ${{ secrets.VERCEL_URL }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: |
          curl -s -X POST "$VERCEL_URL/api/scrape/recompute" \
            -H "Authorization: Bearer $CRON_SECRET" \
            --fail-with-body
