name: Instagram Scraper

on:
  schedule:
    # 3x daily in IST (UTC+5:30):  12:30 PM / 3:30 PM / 8:30 PM IST
    - cron: '0 7 * * *'    # 12:30 PM IST
    - cron: '0 10 * * *'   # 3:30 PM IST
    - cron: '0 15 * * *'   # 8:30 PM IST
  workflow_dispatch:        # allow manual trigger from GitHub UI

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: scraper/requirements.txt

      - name: Install dependencies
        run: pip install -r scraper/requirements.txt

      - name: Run scraper
        env:
          NEXT_PUBLIC_SUPABASE_URL:  ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          INSTAGRAM_USERNAME:        ${{ secrets.INSTAGRAM_USERNAME }}
          INSTAGRAM_SESSIONID:       ${{ secrets.INSTAGRAM_SESSIONID }}
          PYTHONUNBUFFERED:          "1"
        run: python scraper/instagram_scraper.py
